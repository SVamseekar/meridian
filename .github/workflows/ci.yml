name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run unit tests
        run: poetry run pytest tests/unit -v

      - name: Run integration tests (Testcontainers)
        run: poetry run pytest tests/integration -v

  dbt-tests:
    runs-on: ubuntu-latest
    needs: python-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://meridian:meridian@localhost:5432/meridian
        run: poetry run alembic upgrade head

      - name: Seed dev tenant and one raw_events row
        env:
          DATABASE_URL: postgresql+psycopg://meridian:meridian@localhost:5432/meridian
        run: |
          poetry run python scripts/seed_dev_tenant.py
          poetry run python scripts/seed_dev_raw_event.py

      - name: dbt run
        working-directory: dbt
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_PORT: "5432"
          DBT_POSTGRES_USER: meridian
          DBT_POSTGRES_PASSWORD: meridian
          DBT_POSTGRES_DB: meridian
        run: poetry run dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        env:
          DBT_POSTGRES_HOST: localhost
          DBT_POSTGRES_PORT: "5432"
          DBT_POSTGRES_USER: meridian
          DBT_POSTGRES_PASSWORD: meridian
          DBT_POSTGRES_DB: meridian
        run: poetry run dbt test --profiles-dir .

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: python-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install Python dependencies
        run: poetry install

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://meridian:meridian@localhost:5432/meridian
        run: poetry run alembic upgrade head

      - name: Seed dev tenant
        env:
          DATABASE_URL: postgresql+psycopg://meridian:meridian@localhost:5432/meridian
        run: poetry run python scripts/seed_dev_tenant.py

      - name: Start FastAPI
        env:
          DATABASE_URL: postgresql+psycopg://meridian:meridian@localhost:5432/meridian
          REDIS_URL: redis://localhost:6379/0
        run: |
          poetry run uvicorn meridian.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
          CI: true
        run: npx playwright test
